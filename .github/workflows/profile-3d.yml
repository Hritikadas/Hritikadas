name: GitHub-Profile-3D-Contrib

on:
  schedule:
    # Runs automatically every day at midnight
    - cron: "0 0 * * *"
  workflow_dispatch: # Allows you to run it manually anytime

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Generate 3D Contribution Graphs
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: Hritikadas
          
      - name: Commit & Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A .
          git diff --quiet && git diff --staged --quiet || git commit -m "Generated updated 3D contribution graphs"
          git push
